{% load static %}
<style>
    .navbar-custom{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    z-index:1000;

    background:rgba(0,0,0,0.65);

    padding:0 50px;
    height:75px;

    display:flex;
    align-items:center;

    border:none;
    border-radius:0;
}

.logo{
    font-size:24px;
    font-weight:700;
}

.nav-link{
    color:white !important;
    font-size:15px;
    margin:0 12px;
    font-weight:500;
}

.nav-link:hover{
    color:#00b140 !important;
}

.login-btn{
    background:#00c853;
    color:white;

    padding:8px 22px;
    border-radius:25px;

}
.nav-logo{
    width:160px;
    margin-bottom:0;
}

    .navbar-custom{
        padding:10px 15px;
        height:auto;
    }

    .channel-section,
    .show-section{
        padding:15px;
    }

    .channel-title{
        font-size:18px;
    }

    .more-link{

    }

    .controls{
        display:none;
    }

    .channel-card{

        height:90px;
        min-width:90px;
    }

    .show-card{
        width:130px;
        height:190px;
        min-width:130px;

}

        <div class="collapse navbar-collapse"
