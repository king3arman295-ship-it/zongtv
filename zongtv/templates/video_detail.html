<!DOCTYPE html>
<html>
<head>
    <title>{{ video.title }}</title>

    <style>
        body{
            margin:0;
            background:#000;
            color:white;
        }

        .video-container{
            width:100%;
            height:100vh;
        }

        video{
            width:100%;
            height:100%;
            object-fit:contain;
            background:black;
        }

        h1{
            padding:15px 20px;
            margin:0;
        }
    </style>
</head>
<body>

<h1>{{ video.title }}</h1>

<div class="video-container">

    <video controls autoplay>

        <source src="{{ video.video_file.url }}"
                type="video/mp4">

    </video>

</div>

</body>
</html>
