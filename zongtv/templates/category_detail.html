{% load static %}

<!DOCTYPE html>
<html>
<head>

<title>{{ category.name }}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#151515;
    color:white;
    margin:0;
    font-family:sans-serif;
}

.page-title{

    padding-top:120px;
    padding-left:30px;
    padding-bottom:20px;

    font-size:40px;
    font-weight:700;
}

.videos-grid{

    padding:0 30px 50px;

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(220px,1fr));

    gap:20px;
}

.video-card{

    border-radius:12px;
    overflow:hidden;
}

.video-card img{

    width:100%;
    height:320px;

    object-fit:cover;

    transition:.3s;
}

.video-card:hover img{

    transform:scale(1.05);
}

@media(max-width:768px){

    .page-title{
        font-size:28px;
        padding-top:100px;
    }

    .videos-grid{

        grid-template-columns:
        repeat(2,1fr);

        gap:15px;
    }

    .video-card img{
        height:250px;
    }

}

</style>

</head>

<body>

{% include 'includes/header.html' %}

<h1 class="page-title">
    {{ category.name }}
</h1>

<div class="videos-grid">

{% for video in videos %}

<div class="video-card">

    <a href="{% url 'video_detail' video.id %}">

        <img src="{{ video.thumbnail.url }}"
             alt="{{ video.title }}">

    </a>

</div>

{% endfor %}

</div>

{% include 'includes/footer.html' %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
