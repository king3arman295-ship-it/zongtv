{% load static %}

<!DOCTYPE html>
<html>
<head>

    <title>All Shows</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

    body{
        background:#151515;
        color:white;
        margin:0;
    }

    .page-title{
        padding-top:120px;
        padding-left:40px;
        font-size:40px;
        font-weight:700;
    }

    .shows-grid{

        padding:40px;

        display:grid;

        grid-template-columns:
        repeat(auto-fill,minmax(220px,1fr));

        gap:25px;
    }

    .show-card{

        border-radius:12px;
        overflow:hidden;
    }

    .show-card img{

        width:100%;
        height:320px;

        object-fit:cover;

        transition:.3s;
    }

    .show-card:hover img{

        transform:scale(1.05);
    }

    </style>

</head>

<body>

{% include 'includes/header.html' %}

<h1 class="page-title">
    All Shows
</h1>

<div class="shows-grid">

{% for show in shows %}

    <div class="show-card">

        <a href="{% url 'show_detail' show.id %}">

            <img src="{{ show.poster.url }}">

        </a>

    </div>

{% endfor %}

</div>

{% include 'includes/footer.html' %}

</body>
</html>
