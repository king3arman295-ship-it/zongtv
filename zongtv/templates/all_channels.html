{% load static %}

<!DOCTYPE html>
<html>
<head>

<title>All Channels</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#151515;
    color:white;
    margin:0;
    font-family:sans-serif;
}

.page-title{

    padding-top:120px;
    padding-left:30px;
    padding-bottom:20px;

    font-size:40px;
    font-weight:700;
}

.channels-grid{

    padding:0 30px 60px;

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(180px,1fr));

    gap:30px;
}

.channel-card{

    width:160px;
    height:160px;

    margin:auto;

    border-radius:50%;

    overflow:hidden;
}

.channel-card img{

    width:100%;
    height:100%;

    object-fit:cover;

    transition:.3s;
}

.channel-card:hover img{

    transform:scale(1.08);
}

.channel-name{

    text-align:center;

    margin-top:10px;

    color:white;

    font-size:16px;
}

@media(max-width:768px){

    .page-title{
        font-size:28px;
    }

    .channel-card{

        width:120px;
        height:120px;
    }

}

</style>

</head>

<body>

{% include 'includes/header.html' %}

<h1 class="page-title">
    All Channels
</h1>

<div class="channels-grid">

{% for channel in channels %}

<div>

    <div class="channel-card">

        <a href="{% url 'channel_detail' channel.id %}">

            <img src="{{ channel.logo.url }}"
                 alt="{{ channel.name }}">

        </a>

    </div>

    <div class="channel-name">

        {{ channel.name }}

    </div>

</div>

{% endfor %}

</div>

{% include 'includes/footer.html' %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
